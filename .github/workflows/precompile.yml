name: Build Precompiled NIFs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (GNU)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            nif: "2.16"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            nif: "2.17"

          # Linux aarch64 (GNU) — cross-compiled
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            nif: "2.16"
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            nif: "2.17"
            cross: true

          # Linux x86_64 (musl) — for Alpine/static
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            nif: "2.16"
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            nif: "2.17"
            cross: true

          # Linux aarch64 (musl)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            nif: "2.16"
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            nif: "2.17"
            cross: true

          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-13
            nif: "2.16"
          - target: x86_64-apple-darwin
            os: macos-13
            nif: "2.17"

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-14
            nif: "2.16"
          - target: aarch64-apple-darwin
            os: macos-14
            nif: "2.17"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build NIF (native)
        if: ${{ !matrix.cross }}
        run: |
          cd native/ex_libp2p_nif
          cargo build --release --target ${{ matrix.target }}

      - name: Build NIF (cross)
        if: matrix.cross
        run: |
          cd native/ex_libp2p_nif
          cross build --release --target ${{ matrix.target }}

      - name: Package NIF binary
        run: |
          LIBNAME="libex_libp2p_nif"
          case "${{ matrix.target }}" in
            *-apple-*) EXT="dylib" ;;
            *-windows-*) EXT="dll" ;;
            *) EXT="so" ;;
          esac

          SRC="native/ex_libp2p_nif/target/${{ matrix.target }}/release/${LIBNAME}.${EXT}"
          TARNAME="ex_libp2p_nif-nif-${{ matrix.nif }}-${{ matrix.target }}.tar.gz"

          tar -czf "${TARNAME}" -C "$(dirname ${SRC})" "$(basename ${SRC})"
          echo "TARNAME=${TARNAME}" >> $GITHUB_ENV

      - name: Generate checksum
        run: |
          sha256sum "${{ env.TARNAME }}" | tee "${{ env.TARNAME }}.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TARNAME }}
            ${{ env.TARNAME }}.sha256
